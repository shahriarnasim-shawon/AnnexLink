<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnnexLink | User Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Top Navbar -->
    <nav class="navbar">
        <div class="nav-left">
            <a href="feed.html" class="logo-text">Annex<span>Link</span></a>
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="global-search" placeholder="Search services, skills, users...">
                <div id="search-dropdown" class="search-dropdown"></div>
            </div>
        </div>
        <div class="nav-right">
            <!-- Notifications -->
            <div class="notification-wrapper">
                <div class="icon-btn" id="notif-bell" onclick="toggleNotifications()">
                    <i class="fas fa-bell"></i>
                    <span class="badge" id="notif-badge" style="display: none;">0</span>
                </div>
                <div class="notification-dropdown" id="notif-dropdown">
                    <div class="notif-header"><h3>Notifications</h3></div>
                    <div class="notif-list" id="notif-list"></div>
                </div>
            </div>
            <div class="icon-btn" onclick="window.location.href='chat.html'"><i class="fas fa-envelope"></i></div>
            <img id="nav-avatar" src="https://ui-avatars.com/api/?name=User&background=0A192F&color=fff" class="avatar">
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container profile-container">
        
        <!-- Left Sidebar -->
        <aside class="sidebar left-sidebar">
            <ul class="nav-links">
                <li><a href="feed.html"><i class="fas fa-home"></i> AnnexFeed</a></li>
                <li><a href="profile.html"><i class="fas fa-user"></i> Profile</a></li>
                <li><a href="my-services.html"><i class="fas fa-briefcase"></i> My Services</a></li>
                <li><a href="my-requests.html"><i class="fas fa-clipboard-list"></i> My Requests</a></li>
                <li><a href="chat.html"><i class="fas fa-comment-dots"></i> Messages</a></li>
                <li><a href="dashboard.html"><i class="fas fa-chart-pie"></i> Dashboard</a></li>
                <li><a href="#" id="logout-btn" style="color: #E63946;"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="profile-content">
            
            <!-- Public Profile Header -->
            <div class="profile-header-card">
                <div class="profile-cover"></div>
                <div class="profile-info">
                    <img id="public-avatar" src="https://ui-avatars.com/api/?name=Loading&background=0A192F&color=fff" class="profile-avatar">
                    <h2 id="public-name" class="profile-name">Loading...</h2>
                    <p id="public-meta" class="profile-meta">...</p>
                    
                    <div class="profile-stats">
                        <div class="stat-item"><h3 id="public-rating">⭐ 0.0</h3><p>Rating</p></div>
                        <div class="stat-item"><h3 id="public-reviews-count">0</h3><p>Reviews</p></div>
                    </div>

                    <p id="public-bio" class="profile-bio">...</p>

                    <div id="public-skills" class="tags" style="justify-content: center; margin-bottom: 1.5rem;"></div>

                    <div class="post-actions" style="justify-content: center;">
                    <button class="btn btn-secondary" id="message-user-btn"><i class="fas fa-comment-dots"></i> Message</button>
                    <button class="btn btn-outline" style="color: #E63946; border-color: #E63946;" onclick="submitReport()"><i class="fas fa-flag"></i> Report User</button>
                    </div>
                </div>
            </div>
            <!-- User's Active Posts -->
            <h3 class="section-title mt-1">Active Posts</h3>
            <div id="public-posts-list" style="display: grid; gap: 1rem; margin-bottom: 2rem;">
                <p style="text-align:center; color:gray;">Loading posts...</p>
            </div>

            <!-- Reviews Section -->
            <h3 class="section-title">Peer Reviews</h3>
            
            <!-- Add a Review Form -->
            <div class="card" style="margin-bottom: 1.5rem; border-left: 4px solid var(--accent-orange);">
                <h4>Leave a Review</h4>
                <form id="review-form" style="margin-top: 1rem;">
                    <div class="star-rating">
                        <input type="radio" id="star5" name="rating" value="5" required/><label for="star5" title="5 stars"><i class="fas fa-star"></i></label>
                        <input type="radio" id="star4" name="rating" value="4"/><label for="star4" title="4 stars"><i class="fas fa-star"></i></label>
                        <input type="radio" id="star3" name="rating" value="3"/><label for="star3" title="3 stars"><i class="fas fa-star"></i></label>
                        <input type="radio" id="star2" name="rating" value="2"/><label for="star2" title="2 stars"><i class="fas fa-star"></i></label>
                        <input type="radio" id="star1" name="rating" value="1"/><label for="star1" title="1 star"><i class="fas fa-star"></i></label>
                    </div>
                    <textarea id="review-comment" placeholder="Describe your experience with this student..." required style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border-color); outline: none; margin-bottom: 0.5rem;"></textarea>
                    <button type="submit" class="btn btn-primary">Submit Review</button>
                </form>
            </div>

            <!-- List of Reviews -->
            <div id="reviews-list">
                <p style="text-align:center; color:gray;">Loading reviews...</p>
            </div>

        </main>
    </div>

    <script src="notifications.js"></script>
    <script src="search.js"></script>
    <script src="user-profile.js"></script>
</body>
</html>
