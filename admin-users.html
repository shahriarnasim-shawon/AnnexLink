<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Manage Users</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="feed.html" class="logo-text">Annex<span>Link</span> <span style="font-size: 0.9rem; color: #E63946;">ADMIN</span></a>
        </div>
        <div class="nav-right">
            <img src="https://ui-avatars.com/api/?name=Admin&background=E63946&color=fff" alt="Admin" class="avatar">
        </div>
    </nav>

    <div class="container admin-container">
        <!-- Admin Sidebar -->
        <aside class="sidebar left-sidebar">
            <ul class="nav-links">
                <li><a href="feed.html"><i class="fas fa-home"></i> Go to AnnexFeed</a></li>
                <li><a href="admin.html"><i class="fas fa-shield-alt"></i> Dashboard</a></li>
                <li class="active"><a href="admin-users.html"><i class="fas fa-users"></i> Users</a></li>
                <li><a href="admin-reports.html"><i class="fas fa-flag"></i> Reports</a></li>
                <li><a href="admin-settings.html"><i class="fas fa-cog"></i> Settings</a></li>
                <li><a href="index.html" style="color: #E63946;"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="admin-content">
            <div class="admin-header">
                <h2>User Database</h2>
                <button class="btn btn-primary" onclick="makeAdmin()"><i class="fas fa-user-plus"></i> Add Admin</button>
            </div>

            <div class="admin-section">
                <!-- Filters -->
                <div class="filter-bar">
                    <input type="text" placeholder="Search by name or student email...">
                    <select>
                        <option value="all">All Status</option>
                        <option value="active">Active</option>
                        <option value="banned">Banned</option>
                        <option value="reported">Reported</option>
                    </select>
                    <select>
                        <option value="all">All Departments</option>
                        <option value="cse">CSE</option>
                        <option value="bba">BBA</option>
                        <option value="ir">IR</option>
                    </select>
                </div>
                

                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Department & Batch</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-users-table">
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="admin.js"></script>
</body>
</html>
